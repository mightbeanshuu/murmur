<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">EventBus live and durable branches</title><desc id="desc">An event enters EventBus, immediately reaches SSE, and is separately queued for ordered Redis and Kafka delivery.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#274c77"/></marker><style>.b{fill:#fff;stroke:#222;stroke-width:1.6;rx:8}.x{fill:#eef5fb;stroke:#274c77;stroke-width:2;rx:8}.g{fill:#f1f8f4;stroke:#2d6a4f;stroke-width:2;rx:8}.w{font:700 18px Arial;fill:#111}.t{font:14px Arial;fill:#222}.s{font:12px Arial;fill:#444}.l{fill:none;stroke:#274c77;stroke-width:2.2;marker-end:url(#a)}.d{fill:none;stroke:#777;stroke-width:1.6;stroke-dasharray:6 5;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="650" fill="#fff"/><text class="w" x="600" y="35" text-anchor="middle">One emit(), two paths, three different guarantees</text>
  <rect class="x" x="55" y="255" width="210" height="120"/><text class="w" x="160" y="285" text-anchor="middle">emit(event)</text><text class="t" x="160" y="312" text-anchor="middle">assign sequence</text><text class="t" x="160" y="334" text-anchor="middle">build v1 envelope</text><text class="s" x="160" y="356" text-anchor="middle">does not await network I/O</text>
  <path class="l" d="M265 290H390"/><rect class="x" x="390" y="115" width="250" height="150"/><text class="w" x="515" y="146" text-anchor="middle">Live branch</text><text class="t" x="515" y="176" text-anchor="middle">resolve waiting iterator</text><text class="t" x="515" y="200" text-anchor="middle">or push to in-memory queue</text><text class="s" x="515" y="229" text-anchor="middle">low latency; process-local; unbounded</text>
  <path class="l" d="M640 190H760"/><rect class="b" x="760" y="115" width="380" height="150"/><text class="w" x="950" y="146" text-anchor="middle">SSE response</text><text class="t" x="950" y="176" text-anchor="middle">for await (event of bus)</text><text class="t" x="950" y="200" text-anchor="middle">TextEncoder(data: JSON\n\n)</text><text class="s" x="950" y="229" text-anchor="middle">browser may see event before durability finishes</text>
  <path class="l" d="M265 345H390"/><rect class="x" x="390" y="350" width="250" height="180"/><text class="w" x="515" y="381" text-anchor="middle">Durable branch</text><text class="t" x="515" y="411" text-anchor="middle">delivery = previous.catch()</text><text class="t" x="515" y="435" text-anchor="middle">.then(() =&gt; deliver(envelope))</text><text class="s" x="515" y="468" text-anchor="middle">serial order per EventBus/run</text><text class="s" x="515" y="491" text-anchor="middle">sticky first failure; chain continues</text>
  <path class="l" d="M640 405H760"/><rect class="g" x="760" y="330" width="175" height="120"/><text class="w" x="847" y="360" text-anchor="middle">Redis</text><text class="t" x="847" y="389" text-anchor="middle">Lua EVAL</text><text class="s" x="847" y="415" text-anchor="middle">projection + stream</text><text class="s" x="847" y="434" text-anchor="middle">source record first</text>
  <path class="l" d="M935 390H965"/><rect class="g" x="965" y="330" width="175" height="120"/><text class="w" x="1052" y="360" text-anchor="middle">Kafka</text><text class="t" x="1052" y="389" text-anchor="middle">producer.send</text><text class="s" x="1052" y="415" text-anchor="middle">runId partition key</text><text class="s" x="1052" y="434" text-anchor="middle">acks = -1</text>
  <rect class="b" x="760" y="500" width="380" height="100"/><text class="w" x="950" y="530" text-anchor="middle">close() barrier</text><text class="t" x="950" y="557" text-anchor="middle">waits for the durable chain before ending SSE</text><text class="s" x="950" y="580" text-anchor="middle">does not delay each live event; delays final stream closure</text><path class="d" d="M640 500H760"/>
</svg>
