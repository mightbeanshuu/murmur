<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Redis algorithms and data model in Murmur</title><desc id="desc">Fixed-window rate limit and atomic run-event persistence using Redis Lua, hashes, streams and TTL.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#274c77"/></marker><style>.b{fill:#fff;stroke:#222;stroke-width:1.5;rx:8}.x{fill:#eef5fb;stroke:#274c77;stroke-width:2;rx:8}.g{fill:#f1f8f4;stroke:#2d6a4f;stroke-width:2;rx:8}.r{fill:#fff0f0;stroke:#9b2226;stroke-width:2;rx:8}.h{font:700 18px Arial;fill:#111}.t{font:14px Arial;fill:#222}.s{font:12px Arial;fill:#444}.c{font:13px monospace;fill:#111}.l{fill:none;stroke:#274c77;stroke-width:2;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="700" fill="#fff"/><text class="h" x="600" y="34" text-anchor="middle">Redis has two jobs: distributed admission control and recoverable run state</text>
  <rect class="x" x="35" y="65" width="535" height="565"/><text class="h" x="302" y="95" text-anchor="middle">A. Fixed-window rate limiter (one Lua call)</text>
  <rect class="b" x="70" y="125" width="465" height="88"/><text class="c" x="90" y="153">KEYS[1] = murmur:rate:runs:&lt;clientId&gt;</text><text class="c" x="90" y="177">ARGV[1] = windowSeconds</text><text class="s" x="90" y="198">Shared Redis key means every app instance sees the same count.</text>
  <rect class="g" x="90" y="245" width="425" height="155"/><text class="c" x="115" y="276">count = INCR key</text><text class="c" x="115" y="307">if count == 1 then EXPIRE key window</text><text class="c" x="115" y="338">ttl = TTL key</text><text class="c" x="115" y="369">return { count, ttl }</text>
  <path class="l" d="M302 213V245"/><rect class="b" x="90" y="440" width="190" height="105"/><text class="h" x="185" y="469" text-anchor="middle">count ≤ limit</text><text class="t" x="185" y="500" text-anchor="middle">allow request</text><text class="s" x="185" y="523" text-anchor="middle">continue to AI work</text>
  <rect class="r" x="325" y="440" width="190" height="105"/><text class="h" x="420" y="469" text-anchor="middle">count &gt; limit</text><text class="t" x="420" y="500" text-anchor="middle">HTTP 429</text><text class="s" x="420" y="523" text-anchor="middle">Retry-After = max(ttl, 1)</text>
  <path class="l" d="M302 400V420H185V440"/><path class="l" d="M302 420H420V440"/><text class="s" x="302" y="590" text-anchor="middle">Atomicity prevents a crash between INCR and EXPIRE from leaking a key forever.</text>

  <rect class="x" x="600" y="65" width="565" height="565"/><text class="h" x="882" y="95" text-anchor="middle">B. Event persistence (one Lua call, two keys)</text>
  <rect class="b" x="635" y="125" width="495" height="90"/><text class="c" x="655" y="153">sequence guard: HGET eventCount</text><text class="c" x="655" y="177">if current ≥ incoming sequence → return 0</text><text class="s" x="655" y="198">Duplicate/retried lower sequence becomes a no-op.</text>
  <path class="l" d="M882 215V255"/>
  <rect class="g" x="635" y="255" width="220" height="190"/><text class="h" x="745" y="285" text-anchor="middle">Hash projection</text><text class="c" x="655" y="317">murmur:run:&lt;id&gt;</text><text class="s" x="655" y="346">status, goal</text><text class="s" x="655" y="369">startedAt, completedAt</text><text class="s" x="655" y="392">eventCount, final</text><text class="s" x="655" y="415">lastError + TTL</text>
  <rect class="g" x="910" y="255" width="220" height="190"/><text class="h" x="1020" y="285" text-anchor="middle">Redis Stream</text><text class="c" x="930" y="317">murmur:run:&lt;id&gt;:events</text><text class="s" x="930" y="346">XADD sequence-0</text><text class="s" x="930" y="369">field: envelope JSON</text><text class="s" x="930" y="392">MAXLEN ~ 10000</text><text class="s" x="930" y="415">same TTL</text>
  <path class="l" d="M882 255H855"/><path class="l" d="M882 255H910"/>
  <rect class="b" x="690" y="490" width="385" height="95"/><text class="h" x="882" y="520" text-anchor="middle">Two read shapes</text><text class="t" x="882" y="548" text-anchor="middle">Hash = fast current state</text><text class="t" x="882" y="570" text-anchor="middle">Stream = ordered history / replay buffer</text>
  <path class="l" d="M745 445V490"/><path class="l" d="M1020 445V490"/><text class="s" x="882" y="610" text-anchor="middle">Current GET route reads at most 1,000 events; the browser does not automatically invoke it.</text>
</svg>
