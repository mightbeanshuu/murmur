<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Kafka partitioning and delivery in Murmur</title><desc id="desc">Run ID keys route events to one partition, with acknowledgements from in-sync replicas and potential future consumers.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#274c77"/></marker><style>.b{fill:#fff;stroke:#222;stroke-width:1.5;rx:8}.x{fill:#eef5fb;stroke:#274c77;stroke-width:2;rx:8}.g{fill:#f1f8f4;stroke:#2d6a4f;stroke-width:2;rx:8}.h{font:700 18px Arial;fill:#111}.t{font:14px Arial;fill:#222}.s{font:12px Arial;fill:#444}.c{font:13px monospace;fill:#111}.l{fill:none;stroke:#274c77;stroke-width:2;marker-end:url(#a)}.d{fill:none;stroke:#777;stroke-width:1.5;stroke-dasharray:6 5;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="680" fill="#fff"/><text class="h" x="600" y="34" text-anchor="middle">Kafka guarantees order inside a partition, not across the whole topic</text>
  <rect class="x" x="35" y="190" width="210" height="170"/><text class="h" x="140" y="220" text-anchor="middle">KafkaJS producer</text><text class="t" x="140" y="250" text-anchor="middle">key = runId</text><text class="t" x="140" y="274" text-anchor="middle">acks = -1</text><text class="t" x="140" y="298" text-anchor="middle">idempotent = true</text><text class="s" x="140" y="329" text-anchor="middle">headers: kind/version/id</text>
  <path class="l" d="M245 275H335"/><rect class="b" x="335" y="185" width="180" height="180"/><text class="h" x="425" y="215" text-anchor="middle">Partitioner</text><text class="t" x="425" y="250" text-anchor="middle">hash(message key)</text><text class="s" x="425" y="280" text-anchor="middle">run A always maps</text><text class="s" x="425" y="301" text-anchor="middle">to the same partition</text><text class="s" x="425" y="330" text-anchor="middle">different runs may map</text><text class="s" x="425" y="351" text-anchor="middle">to different partitions</text>
  <path class="l" d="M515 225H610"/><path class="l" d="M515 275H610"/><path class="l" d="M515 325H610"/>
  <rect class="g" x="610" y="90" width="250" height="105"/><text class="h" x="735" y="120" text-anchor="middle">Partition 0</text><text class="c" x="630" y="150">run-B:1  run-B:2  run-B:3</text><text class="s" x="630" y="176">ordered offsets in this shard</text>
  <rect class="g" x="610" y="225" width="250" height="105"/><text class="h" x="735" y="255" text-anchor="middle">Partition 1</text><text class="c" x="630" y="285">run-A:1  run-A:2  run-A:3</text><text class="s" x="630" y="311">strict per-run order</text>
  <rect class="g" x="610" y="360" width="250" height="105"/><text class="h" x="735" y="390" text-anchor="middle">Partitions 2–5</text><text class="c" x="630" y="420">other run keys and offsets</text><text class="s" x="630" y="446">parallelism capacity</text>
  <path class="l" d="M860 277H950"/><rect class="b" x="950" y="185" width="210" height="180"/><text class="h" x="1055" y="215" text-anchor="middle">ISR acknowledgement</text><text class="t" x="1055" y="248" text-anchor="middle">leader + in-sync replicas</text><text class="s" x="1055" y="280" text-anchor="middle">local Compose: RF = 1</text><text class="s" x="1055" y="305" text-anchor="middle">production target: RF = 3</text><text class="s" x="1055" y="330" text-anchor="middle">min ISR commonly 2</text>
  <rect class="x" x="265" y="510" width="670" height="120"/><text class="h" x="600" y="540" text-anchor="middle">Consumer-side boundary</text><text class="t" x="600" y="570" text-anchor="middle">This repository produces events but implements no Kafka consumer or consumer group.</text><text class="s" x="600" y="596" text-anchor="middle">Analytics, audit, notifications, or an outbox relay are future/external consumers. Exactly-once end to end is not claimed.</text>
  <path class="d" d="M735 465V510"/><text class="s" x="600" y="657" text-anchor="middle">If Kafka fails on event 7, Redis may contain event 7, Kafka may continue receiving 8–20, and close() reports terminal failure: there is a Kafka gap until an outbox/retry relay exists.</text>
</svg>
