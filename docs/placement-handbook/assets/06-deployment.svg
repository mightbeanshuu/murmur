<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Local and production Murmur deployments</title><desc id="desc">Comparison of local Docker Compose infrastructure and production managed services with the recommended worker and outbox evolution.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#274c77"/></marker><style>.panel{fill:#f7f7f7;stroke:#bbb;stroke-width:1}.b{fill:#fff;stroke:#222;stroke-width:1.5;rx:8}.x{fill:#eef5fb;stroke:#274c77;stroke-width:2;rx:8}.g{fill:#f1f8f4;stroke:#2d6a4f;stroke-width:2;rx:8}.o{fill:#fff4e6;stroke:#b5651d;stroke-width:2;rx:8}.h{font:700 18px Arial;fill:#111}.t{font:14px Arial;fill:#222}.s{font:12px Arial;fill:#444}.l{fill:none;stroke:#274c77;stroke-width:2;marker-end:url(#a)}.d{fill:none;stroke:#777;stroke-width:1.5;stroke-dasharray:6 5;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="700" fill="#fff"/><rect class="panel" x="25" y="55" width="555" height="610"/><rect class="panel" x="620" y="55" width="555" height="610"/>
  <text class="h" x="302" y="35" text-anchor="middle">Local development: what exists now</text><text class="h" x="897" y="35" text-anchor="middle">Production evolution: what to propose</text>
  <rect class="x" x="65" y="95" width="210" height="110"/><text class="h" x="170" y="125" text-anchor="middle">Next.js process</text><text class="t" x="170" y="154" text-anchor="middle">pnpm dev or Docker image</text><text class="s" x="170" y="181" text-anchor="middle">Node runtime, port 3000</text>
  <rect class="g" x="335" y="90" width="200" height="125"/><text class="h" x="435" y="120" text-anchor="middle">Redis container</text><text class="t" x="435" y="149" text-anchor="middle">localhost:6379</text><text class="s" x="435" y="174" text-anchor="middle">AOF everysec + RDB</text><text class="s" x="435" y="194" text-anchor="middle">named volume</text>
  <path class="l" d="M275 150H335"/>
  <rect class="g" x="335" y="275" width="200" height="135"/><text class="h" x="435" y="305" text-anchor="middle">Kafka 4 container</text><text class="t" x="435" y="334" text-anchor="middle">KRaft combined node</text><text class="s" x="435" y="359" text-anchor="middle">host: localhost:9092</text><text class="s" x="435" y="380" text-anchor="middle">Docker: kafka:19092</text><text class="s" x="435" y="400" text-anchor="middle">RF = 1, six partitions</text>
  <path class="l" d="M275 170V342H335"/>
  <rect class="b" x="65" y="275" width="210" height="135"/><text class="h" x="170" y="305" text-anchor="middle">Compose helpers</text><text class="t" x="170" y="334" text-anchor="middle">storage chown init</text><text class="t" x="170" y="358" text-anchor="middle">topic create init</text><text class="s" x="170" y="384" text-anchor="middle">health-gated startup</text>
  <path class="d" d="M275 342H335"/>
  <rect class="o" x="65" y="480" width="470" height="120"/><text class="h" x="300" y="510" text-anchor="middle">Local-only warning</text><text class="t" x="300" y="540" text-anchor="middle">localhost and Docker DNS are not reachable from Vercel.</text><text class="s" x="300" y="566" text-anchor="middle">Compose is single-node development infrastructure, not high availability.</text>

  <rect class="x" x="655" y="90" width="210" height="125"/><text class="h" x="760" y="120" text-anchor="middle">App instances</text><text class="t" x="760" y="149" text-anchor="middle">container service</text><text class="s" x="760" y="175" text-anchor="middle">TLS env endpoints</text><text class="s" x="760" y="195" text-anchor="middle">auth + per-user quotas</text>
  <rect class="g" x="925" y="90" width="210" height="125"/><text class="h" x="1030" y="120" text-anchor="middle">Managed Redis</text><text class="t" x="1030" y="149" text-anchor="middle">rediss://</text><text class="s" x="1030" y="175" text-anchor="middle">replicas + backups</text><text class="s" x="1030" y="195" text-anchor="middle">memory alerts</text><path class="l" d="M865 150H925"/>
  <rect class="g" x="925" y="275" width="210" height="135"/><text class="h" x="1030" y="305" text-anchor="middle">Managed Kafka</text><text class="t" x="1030" y="334" text-anchor="middle">TLS + SASL + ACLs</text><text class="s" x="1030" y="359" text-anchor="middle">RF = 3, min ISR = 2</text><text class="s" x="1030" y="380" text-anchor="middle">retention + lag alerts</text><path class="l" d="M865 175V342H925"/>
  <rect class="o" x="655" y="275" width="210" height="135"/><text class="h" x="760" y="305" text-anchor="middle">Worker tier</text><text class="t" x="760" y="334" text-anchor="middle">durable job execution</text><text class="s" x="760" y="359" text-anchor="middle">cancellation + retries</text><text class="s" x="760" y="380" text-anchor="middle">not implemented today</text><path class="d" d="M865 342H925"/>
  <rect class="o" x="655" y="480" width="480" height="125"/><text class="h" x="895" y="510" text-anchor="middle">Transactional outbox roadmap</text><text class="t" x="895" y="540" text-anchor="middle">Persist event + outbox state atomically in one store.</text><text class="t" x="895" y="564" text-anchor="middle">Relay retries Kafka publication; consumers are idempotent.</text><text class="s" x="895" y="587" text-anchor="middle">This closes the current Redis → Kafka dual-write gap.</text>
</svg>
