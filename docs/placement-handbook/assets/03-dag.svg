<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Murmur DAG scheduling and validation</title><desc id="desc">Planner creates tasks, independent tasks run in waves, validation may retry, and synthesis combines completed outputs.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3L0 6Z" fill="#274c77"/></marker><style>.b{fill:#fff;stroke:#222;stroke-width:1.5;rx:8}.p{fill:#eef5fb;stroke:#274c77;stroke-width:2;rx:8}.v{fill:#fff4e6;stroke:#b5651d;stroke-width:2;rx:8}.g{fill:#f1f8f4;stroke:#2d6a4f;stroke-width:2;rx:8}.h{font:700 18px Arial;fill:#111}.t{font:14px Arial;fill:#222}.s{font:12px Arial;fill:#444}.l{fill:none;stroke:#274c77;stroke-width:2;marker-end:url(#a)}.r{fill:none;stroke:#b5651d;stroke-width:2;stroke-dasharray:6 4;marker-end:url(#a)}</style></defs>
  <rect width="1200" height="680" fill="#fff"/><text class="h" x="600" y="35" text-anchor="middle">Planner → dependency waves → validator gate → synthesis</text>
  <rect class="p" x="45" y="260" width="160" height="100"/><text class="h" x="125" y="290" text-anchor="middle">User goal</text><text class="s" x="125" y="319" text-anchor="middle">one complex prompt</text><text class="s" x="125" y="340" text-anchor="middle">tokensIn starts here</text>
  <path class="l" d="M205 310H275"/><rect class="p" x="275" y="235" width="190" height="150"/><text class="h" x="370" y="265" text-anchor="middle">Planner</text><text class="t" x="370" y="293" text-anchor="middle">Zod planSchema</text><text class="s" x="370" y="318" text-anchor="middle">2–4 tasks</text><text class="s" x="370" y="339" text-anchor="middle">IDs + types + dependsOn</text><text class="s" x="370" y="360" text-anchor="middle">fallback plan on failure</text>
  <path class="l" d="M465 275H545V115"/><path class="l" d="M465 310H545"/><path class="l" d="M465 345H545V505"/>
  <rect class="b" x="545" y="65" width="190" height="100"/><text class="h" x="640" y="95" text-anchor="middle">Wave 1: Task A</text><text class="t" x="640" y="123" text-anchor="middle">researcher</text><text class="s" x="640" y="145" text-anchor="middle">dependsOn: []</text>
  <rect class="b" x="545" y="260" width="190" height="100"/><text class="h" x="640" y="290" text-anchor="middle">Wave 1: Task B</text><text class="t" x="640" y="318" text-anchor="middle">analyst</text><text class="s" x="640" y="340" text-anchor="middle">dependsOn: []</text>
  <rect class="b" x="545" y="455" width="190" height="100"/><text class="h" x="640" y="485" text-anchor="middle">Wave 2: Task C</text><text class="t" x="640" y="513" text-anchor="middle">writer / coder</text><text class="s" x="640" y="535" text-anchor="middle">dependsOn: [A, B]</text>
  <path class="l" d="M640 165V210H780"/><path class="l" d="M735 310H780"/><path class="l" d="M735 505H780"/>
  <rect class="v" x="780" y="220" width="190" height="180"/><text class="h" x="875" y="250" text-anchor="middle">Validator</text><text class="t" x="875" y="280" text-anchor="middle">score 0–10</text><text class="t" x="875" y="304" text-anchor="middle">approved boolean</text><text class="t" x="875" y="328" text-anchor="middle">actionable feedback</text><text class="s" x="875" y="358" text-anchor="middle">code requires approved</text><text class="s" x="875" y="378" text-anchor="middle">AND score ≥ 7</text>
  <path class="r" d="M875 220V175H640"/><text class="s" x="785" y="166" text-anchor="middle">reject → one revision</text>
  <path class="l" d="M970 310H1015"/><rect class="g" x="1015" y="245" width="150" height="130"/><text class="h" x="1090" y="275" text-anchor="middle">Blackboard</text><text class="t" x="1090" y="304" text-anchor="middle">completed Map</text><text class="s" x="1090" y="330" text-anchor="middle">task + agentId</text><text class="s" x="1090" y="351" text-anchor="middle">+ output</text>
  <path class="l" d="M1090 375V455"/><rect class="p" x="970" y="455" width="240" height="140"/><text class="h" x="1090" y="487" text-anchor="middle">Synthesizer</text><text class="t" x="1090" y="518" text-anchor="middle">full completed corpus</text><text class="s" x="1090" y="545" text-anchor="middle">streams final answer</text><text class="s" x="1090" y="567" text-anchor="middle">emits run.done</text>
  <text class="s" x="600" y="630" text-anchor="middle">Scheduling rule: a task is ready only when every dependency ID exists in completed. Empty ready set + remaining tasks signals an unsatisfied graph.</text>
</svg>
