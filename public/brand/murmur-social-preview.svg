<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Murmur — live agent swarm orchestration</title>
  <desc id="desc">A dark neon product preview with the Murmur logo and a connected agent graph.</desc>
  <defs>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientTransform="translate(250 160) rotate(35) scale(650 420)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b3cae" stop-opacity=".42"/><stop offset="1" stop-color="#08070d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyan" cx="0" cy="0" r="1" gradientTransform="translate(1080 540) rotate(-145) scale(520 340)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0e7490" stop-opacity=".3"/><stop offset="1" stop-color="#08070d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="1280" height="640" rx="32" fill="#08070d"/>
  <rect width="1280" height="640" rx="32" fill="url(#violet)"/>
  <rect width="1280" height="640" rx="32" fill="url(#cyan)"/>
  <path d="M0 128h1280M0 256h1280M0 384h1280M0 512h1280M160 0v640M320 0v640M480 0v640M640 0v640M800 0v640M960 0v640M1120 0v640" stroke="#fff" stroke-opacity=".035"/>
  <g transform="translate(86 86)">
    <rect x="2" y="2" width="92" height="92" rx="24" fill="#12101f"/>
    <rect x="2.5" y="2.5" width="91" height="91" rx="23.5" fill="none" stroke="#a78bfa" stroke-opacity=".45"/>
    <path d="M18 67 32 29l16 38 16-38 14 38" fill="none" stroke="#a78bfa" stroke-linecap="round" stroke-linejoin="round" stroke-width="7"/>
    <circle cx="18" cy="67" r="4.5" fill="#67e8f9"/><circle cx="32" cy="29" r="4.5" fill="#c4b5fd"/>
    <circle cx="48" cy="67" r="4.5" fill="#67e8f9"/><circle cx="64" cy="29" r="4.5" fill="#c4b5fd"/>
    <circle cx="78" cy="67" r="4.5" fill="#67e8f9"/>
  </g>
  <text x="86" y="256" fill="#f6f3ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="86" font-weight="740" letter-spacing="-3">Murmur</text>
  <text x="90" y="320" fill="#c8c2db" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30">One goal. A live, validated agent swarm.</text>
  <g transform="translate(90 375)" font-family="ui-monospace, SFMono-Regular, monospace" font-size="19">
