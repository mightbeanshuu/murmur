      <rect x="12" y="166" width="120" height="80" rx="14" stroke="#67e8f9"/>
      <rect x="250" y="166" width="120" height="80" rx="14" stroke="#f0abfc"/>
      <rect x="194" y="350" width="156" height="80" rx="14" stroke="#6ee7b7"/>
    </g>
    <g fill="#fff" opacity=".28" filter="url(#glow)"><circle cx="186" cy="102" r="22"/><circle cx="72" cy="206" r="20"/><circle cx="310" cy="206" r="20"/><circle cx="272" cy="390" r="20"/></g>
    <g fill="#f6f3ff" font-family="ui-sans-serif, system-ui" font-size="16" font-weight="650" text-anchor="middle">
      <text x="186" y="108">PLANNER</text><text x="72" y="212">RESEARCH</text><text x="310" y="212">ANALYZE</text><text x="272" y="396">SYNTHESIZE</text>
