    <circle cx="24" cy="22" r="5" fill="#67e8f9"/><text x="42" y="29" fill="#ddd6fe">PLAN → RUN</text>
    <rect x="192" width="188" height="44" rx="22" fill="#67e8f9" fill-opacity=".08" stroke="#67e8f9" stroke-opacity=".3"/>
    <circle cx="216" cy="22" r="5" fill="#a78bfa"/><text x="234" y="29" fill="#cffafe">VALIDATE</text>
    <rect x="396" width="194" height="44" rx="22" fill="#a78bfa" fill-opacity=".12" stroke="#a78bfa" stroke-opacity=".35"/>
    <circle cx="420" cy="22" r="5" fill="#67e8f9"/><text x="438" y="29" fill="#ddd6fe">SYNTHESIZE</text>
  </g>
  <g transform="translate(790 116)">
    <path d="M72 206 186 102M186 102l124 104M186 102l86 288M72 206l200 184M310 206l-38 184" stroke="#a78bfa" stroke-opacity=".35" stroke-width="3"/>
